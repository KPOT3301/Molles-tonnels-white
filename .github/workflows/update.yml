name: Update VLESS Subscription

on:
  workflow_dispatch:
  schedule:
    - cron: '0 21 * * *'   # 00:00 Москва (UTC+3)

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp

      - name: Run generator
        run: python GENERATOR.py

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add Molestunnels.txt Molestunnels_base64.txt
          git diff --cached --quiet || git commit -m "Auto update subscription"
          git push
