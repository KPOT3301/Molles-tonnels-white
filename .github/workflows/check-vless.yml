name: Check Vless Servers

on:
  schedule:
    - cron: '0 3 * * *'   # 03:00 UTC = 06:00 MSK
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install geoip2

      - name: Download Xray-core
        run: |
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -q Xray-linux-64.zip -d xray-core
          chmod +x xray-core/xray
          echo "$(pwd)/xray-core" >> $GITHUB_PATH

      - name: Run GENERATOR.py
        run: python GENERATOR.py

      - name: Commit and push if subscription.txt changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add subscription.txt
          git diff --quiet && git diff --staged --quiet || (
            git commit -m "Auto-update subscription.txt"
            git push https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref }}
          )
